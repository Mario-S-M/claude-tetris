name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    if: github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    concurrency:
      group: claude-issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Read,Grep,Glob,Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*)"'
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio de Tetris (HTML/CSS/JS puro, ver CLAUDE.md para la arquitectura).

            1. Lee el título y cuerpo del issue con `gh issue view ${{ github.event.issue.number }}`.
            2. Revisa el código relevante (index.html, style.css, game.js, CLAUDE.md) para entender el contexto técnico.
            3. Elige las labels apropiadas SOLO entre las ya existentes en el repo (verifica con `gh label list`: bug, enhancement, documentation, question, help wanted, good first issue, duplicate, invalid, wontfix) y asígnalas con `gh issue edit ${{ github.event.issue.number }} --add-label "..."`. No crees labels nuevas.
            4. Publica un comentario (`gh issue comment ${{ github.event.issue.number }} --body "..."`) con un diagnóstico estructurado:
               - Resumen del problema
               - Causa raíz probable, citando funciones/identificadores concretos de game.js cuando aplique (p.ej. collide(), rotateCW(), clearLines(), loop(), spawn())
               - Archivos/áreas del código afectadas
               - Enfoque de solución a alto nivel (sin implementar código todavía — esto se usará después para el fix)
               - Complejidad/severidad estimada

            IMPORTANTE: no modifiques archivos de código ni crees commits o PRs. Solo etiqueta y comenta el issue.
